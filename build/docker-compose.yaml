version: '3.8'

services:
  live-api:
    build:
      context: ..
      dockerfile: build/Dockerfile-go
    container_name: live-api
    volumes:
      - ../:/app
      - live-api-certs:/etc/ssl
    ports:
      - "443:443"
    environment:
      - GO111MODULE=on
      - CGO_ENABLED=0
    command: ["/app/main"]

  live-www:
    build:
      context: ../../live-www
      dockerfile: ../live-api/build/Dockerfile-vue
    container_name: live-www
    ports:
      - "5173:5173"
    environment:
      - VITE_DEV_SERVER_HOST=0.0.0.0

  nginx:
    build:
      context: ..
      dockerfile: build/Dockerfile-nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - live-api-certs:/etc/ssl
      - ..//build/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  live-api-certs: