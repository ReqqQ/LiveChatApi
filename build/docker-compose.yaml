version: '3.8'

services:
  vue-app:
    build:
      context: ../..
      dockerfile: live-api/build/Dockerfile-vue
    volumes:
      - ../../live-www:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    networks:
      - app-network

  go-app:
    build:
      context: ../..
      dockerfile: live-api/build/Dockerfile-go
    volumes:
      - ../../live-api:/app
    networks:
      - app-network
    depends_on:
      - vue-app
    ports:
      - "8081:8081"

  nginx:
    build:
      context: ../..
      dockerfile: live-api/build/Dockerfile-nginx
    volumes:
      - ../../live-api/build/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app-network
    depends_on:
      - vue-app
      - go-app

networks:
  app-network:
    driver: bridge